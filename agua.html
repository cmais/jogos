<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player SWF</title>

<script src="ruffle/ruffle.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#0e0e0e;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial, Helvetica, sans-serif;
color:white;

}

/* container externo */

#game-wrapper{

width:95vw;
height:95vh;

display:flex;
justify-content:center;
align-items:center;

}

/* container do jogo */

#game-container{

width:100%;
height:100%;

max-width:1200px;
max-height:900px;

background:black;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

}

/* player ruffle */

ruffle-player{

width:100%;
height:100%;

}

</style>

</head>

<body>

<div id="game-wrapper">

<div id="game-container"></div>

</div>

<script>

window.RufflePlayer = window.RufflePlayer || {};

window.addEventListener("load", () => {

const ruffle = window.RufflePlayer.newest();

const player = ruffle.createPlayer();

const container = document.getElementById("game-container");

player.style.width = "100%";
player.style.height = "100%";

container.appendChild(player);

player.load("agua.swf");

});

</script>

</body>

</html>
